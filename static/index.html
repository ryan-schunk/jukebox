<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jukebox</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Disconnected overlay -->
  <div id="disconnected" class="overlay hidden">
    <div class="overlay-content">
      <div class="spinner"></div>
      <p>Connecting to Music Assistant...</p>
    </div>
  </div>

  <main id="app">
    <!-- NOW PLAYING -->
    <section id="now-playing" class="screen np-screen active">
      <div class="backdrop" id="np-backdrop"></div>
      <div class="np-hero">
        <div class="np-ring-wrap">
          <svg class="np-ring" viewBox="0 0 100 100">
            <circle class="np-ring-track" cx="50" cy="50" r="47"></circle>
            <circle class="np-ring-fill" id="np-ring-fill" cx="50" cy="50" r="47"></circle>
          </svg>
          <div class="np-art-wrap">
            <img id="np-art" src="" alt="Album Art" class="np-art" decoding="async">
            <div id="np-placeholder" class="np-placeholder">Nothing Playing</div>
          </div>
        </div>
      </div>
      <div class="np-meta">
        <div id="np-title" class="np-title"></div>
        <div id="np-artist" class="np-artist"></div>
        <div class="np-time">
          <span id="elapsed">0:00</span>
          <span class="np-time-sep">/</span>
          <span id="duration">0:00</span>
        </div>
      </div>
    </section>

    <!-- BROWSE -->
    <section id="browse" class="screen hero-screen">
      <div class="backdrop" id="browse-backdrop"></div>
      <div class="hero-stage">
        <div class="peek peek-prev empty" id="browse-peek-prev">
          <img class="peek-art" alt="" decoding="async">
        </div>
        <div class="hero-item">
          <img class="hero-art" id="browse-hero-art" alt="" decoding="async">
          <div class="hero-empty" id="browse-empty">No albums found</div>
        </div>
        <div class="peek peek-next empty" id="browse-peek-next">
          <img class="peek-art" alt="" decoding="async">
        </div>
      </div>
      <div class="hero-meta">
        <div class="hero-title" id="browse-title"></div>
        <div class="hero-subtitle" id="browse-subtitle"></div>
      </div>
    </section>

    <!-- ARTISTS -->
    <section id="artists" class="screen hero-screen">
      <div class="backdrop" id="artists-backdrop"></div>
      <div class="hero-stage">
        <div class="peek peek-prev empty" id="artists-peek-prev">
          <img class="peek-art" alt="" decoding="async">
        </div>
        <div class="hero-item">
          <img class="hero-art" id="artists-hero-art" alt="" decoding="async">
          <div class="hero-empty" id="artists-empty">No artists found</div>
        </div>
        <div class="peek peek-next empty" id="artists-peek-next">
          <img class="peek-art" alt="" decoding="async">
        </div>
      </div>
      <div class="hero-meta">
        <div class="hero-title" id="artists-title"></div>
        <div class="hero-subtitle" id="artists-subtitle"></div>
      </div>
    </section>

    <!-- ARTIST ALBUMS (drill-in) -->
    <section id="artist-albums" class="screen hero-screen">
      <div class="backdrop" id="artist-albums-backdrop"></div>
      <div class="hero-context" id="artist-albums-title"></div>
      <div class="hero-stage">
        <div class="peek peek-prev empty" id="artist-albums-peek-prev">
          <img class="peek-art" alt="" decoding="async">
        </div>
        <div class="hero-item">
          <img class="hero-art" id="artist-albums-hero-art" alt="" decoding="async">
          <div class="hero-empty" id="artist-albums-empty">No albums found</div>
        </div>
        <div class="peek peek-next empty" id="artist-albums-peek-next">
          <img class="peek-art" alt="" decoding="async">
        </div>
      </div>
      <div class="hero-meta">
        <div class="hero-title" id="artist-albums-hero-title"></div>
        <div class="hero-subtitle" id="artist-albums-hero-subtitle"></div>
      </div>
    </section>

    <!-- QUEUE -->
    <section id="queue" class="screen">
      <h2 class="screen-title">Queue</h2>
      <div id="queue-list" class="item-list">
        <div id="queue-empty" class="empty-message hidden">Queue empty</div>
      </div>
    </section>
  </main>

  <!-- Button bar -->
  <nav id="button-bar">
    <div class="btn-label" id="btn1-label">Play/Pause</div>
    <div class="btn-label" id="btn2-label">Previous</div>
    <div class="btn-label" id="btn3-label">Next</div>
    <div class="btn-label" id="btn4-label">Next Screen</div>
  </nav>

  <script src="/static/app.js"></script>
</body>
</html>
